<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>けぼこ配信ツール</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 40px 24px;
    }

    h1 {
      font-size: 1.5em;
      margin-bottom: 32px;
      color: #444;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 480px;
    }

    .tool {
      display: block;
      background: white;
      border-radius: 8px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: box-shadow 0.15s;
    }

    .tool:hover {
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }

    .tool-name {
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .tool-desc {
      font-size: 0.9em;
      color: #777;
    }
  </style>
</head>
<body>
  <h1>配信ツール</h1>
  <div class="tools">
    <a class="tool" href="scenario-viewer/">
      <div class="tool-name">シナリオビューワー</div>
      <div class="tool-desc">お焚き上げ配信用 ← → キーでシナリオを送り</div>
    </a>
  </div>
</body>
</html>
