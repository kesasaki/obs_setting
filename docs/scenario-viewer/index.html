<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シナリオビューワー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      color: black;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      padding: 16px;
      user-select: none;
    }

    #viewer {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #code {
      font-size: 2em;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    #comment {
      font-size: 1.4em;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    #counter {
      font-size: 0.9em;
      opacity: 0.6;
      margin-top: 4px;
    }

    #empty {
      font-size: 1.2em;
      opacity: 0.5;
    }

    #nav {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .nav-btn {
      font-size: 1.2em;
      padding: 6px 20px;
      border: 2px solid rgba(0,0,0,0.3);
      border-radius: 6px;
      background: rgba(255,255,255,0.6);
      color: black;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.9);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="code"></div>
    <div id="comment"></div>
    <div id="counter"></div>
    <div id="empty" style="display:none">シナリオがありません</div>
    <div id="nav">
      <button class="nav-btn" id="btn-prev" onclick="move(-1)">◀ 前へ</button>
      <button class="nav-btn" id="btn-next" onclick="move(1)">次へ ▶</button>
    </div>
  </div>

  <script>
    let scenarios = [];
    let index = 0;

    function move(dir) {
      index = Math.max(0, Math.min(index + dir, scenarios.length - 1));
      render();
    }

    function render() {
      const codeEl = document.getElementById('code');
      const commentEl = document.getElementById('comment');
      const counterEl = document.getElementById('counter');
      const emptyEl = document.getElementById('empty');
      const navEl = document.getElementById('nav');

      if (scenarios.length === 0) {
        codeEl.style.display = 'none';
        commentEl.style.display = 'none';
        counterEl.style.display = 'none';
        navEl.style.display = 'none';
        emptyEl.style.display = '';
        return;
      }

      const s = scenarios[index];
      codeEl.textContent = s.code;
      commentEl.textContent = s.comment;
      counterEl.textContent = `${index + 1} / ${scenarios.length}`;
      document.getElementById('btn-prev').disabled = index === 0;
      document.getElementById('btn-next').disabled = index === scenarios.length - 1;

      codeEl.style.display = '';
      commentEl.style.display = '';
      counterEl.style.display = '';
      navEl.style.display = '';
      emptyEl.style.display = 'none';
    }

    document.addEventListener('keydown', (e) => {
      if (scenarios.length === 0) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') move(-1);
    });

    fetch('scenarios.json')
      .then(r => r.json())
      .then(data => {
        scenarios = data.scenarios || [];
        render();
      })
      .catch(() => {
        document.getElementById('empty').textContent = 'scenarios.json の読み込みに失敗しました';
        document.getElementById('empty').style.display = '';
      });
  </script>
</body>
</html>
