<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シナリオビューワー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: transparent;
      color: black;
      user-select: none;
    }

    /* ---- 表示モード ---- */
    #view {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #code {
      font-size: 2em;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    #comment {
      font-size: 1.4em;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    #counter {
      font-size: 0.9em;
      opacity: 0.6;
      margin-top: 4px;
    }

    #nav {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .nav-btn {
      font-size: 1.1em;
      padding: 6px 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-radius: 6px;
      background: rgba(255,255,255,0.6);
      color: black;
      cursor: pointer;
    }

    .nav-btn:hover { background: rgba(255,255,255,0.9); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    #edit-toggle {
      font-size: 0.8em;
      padding: 4px 10px;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 4px;
      background: rgba(255,255,255,0.4);
      color: black;
      cursor: pointer;
      margin-top: 8px;
      align-self: flex-start;
    }

    #empty { font-size: 1.2em; opacity: 0.5; }

    /* ---- 編集モード ---- */
    #editor {
      display: none;
      position: fixed;
      inset: 0;
      background: white;
      color: #222;
      flex-direction: column;
      overflow: hidden;
    }

    #editor.open { display: flex; }

    #editor-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #editor-header h2 { font-size: 1.1em; flex: 1; }

    .hdr-btn {
      font-size: 0.85em;
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid #bbb;
      background: #f5f5f5;
      cursor: pointer;
    }

    .hdr-btn.primary {
      background: #222;
      color: white;
      border-color: #222;
    }

    #scenario-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .scenario-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      background: #f9f9f9;
      border-radius: 6px;
      padding: 10px;
    }

    .scenario-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .scenario-fields input,
    .scenario-fields textarea {
      width: 100%;
      font-size: 0.95em;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
      background: white;
      color: #222;
    }

    .scenario-fields textarea {
      resize: vertical;
      min-height: 52px;
    }

    .label {
      font-size: 0.72em;
      color: #888;
      margin-bottom: 2px;
    }

    .del-btn {
      font-size: 1.1em;
      padding: 4px 8px;
      border: none;
      background: none;
      color: #aaa;
      cursor: pointer;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #e55; }

    #add-btn {
      margin: 0 16px 16px;
      padding: 10px;
      border: 2px dashed #ccc;
      border-radius: 6px;
      background: none;
      color: #888;
      font-size: 0.95em;
      cursor: pointer;
      flex-shrink: 0;
    }

    #add-btn:hover { border-color: #888; color: #444; }
  </style>
</head>
<body>

  <!-- 表示モード -->
  <div id="view">
    <div id="code"></div>
    <div id="comment"></div>
    <div id="counter"></div>
    <div id="empty" style="display:none">シナリオがありません</div>
    <div id="nav" style="display:none">
      <button class="nav-btn" id="btn-prev" onclick="move(-1)">◀ 前へ</button>
      <button class="nav-btn" id="btn-next" onclick="move(1)">次へ ▶</button>
    </div>
    <button id="edit-toggle" onclick="openEditor()">✏ 編集</button>
  </div>

  <!-- 編集モード -->
  <div id="editor">
    <div id="editor-header">
      <h2>シナリオ編集</h2>
      <button class="hdr-btn" onclick="importCSV()">CSVインポート</button>
      <button class="hdr-btn" onclick="exportCSV()">CSVエクスポート</button>
      <button class="hdr-btn" onclick="resetToDefault()">初期データに戻す</button>
      <button class="hdr-btn primary" onclick="saveAndClose()">保存して閉じる</button>
    </div>
    <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCSVImport(this)">
    <div id="scenario-list"></div>
    <button id="add-btn" onclick="addScenario()">＋ シナリオを追加</button>
  </div>

  <script>
    const STORAGE_KEY = 'obs-scenario-viewer';
    let scenarios = [];
    let index = 0;

    // ---- localStorage ----
    function loadFromStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : null;
    }

    function saveToStorage(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ---- 表示 ----
    function move(dir) {
      index = Math.max(0, Math.min(index + dir, scenarios.length - 1));
      render();
    }

    function render() {
      const empty = scenarios.length === 0;
      document.getElementById('empty').style.display = empty ? '' : 'none';
      document.getElementById('nav').style.display = empty ? 'none' : '';
      if (empty) {
        document.getElementById('code').textContent = '';
        document.getElementById('comment').textContent = '';
        document.getElementById('counter').textContent = '';
        return;
      }
      const s = scenarios[index];
      document.getElementById('code').textContent = s.code;
      document.getElementById('comment').textContent = s.comment;
      document.getElementById('counter').textContent = `${index + 1} / ${scenarios.length}`;
      document.getElementById('btn-prev').disabled = index === 0;
      document.getElementById('btn-next').disabled = index === scenarios.length - 1;
    }

    document.addEventListener('keydown', (e) => {
      if (document.getElementById('editor').classList.contains('open')) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') move(-1);
    });

    // ---- 編集モード ----
    function openEditor() {
      buildEditorList();
      document.getElementById('editor').classList.add('open');
    }

    function buildEditorList() {
      const list = document.getElementById('scenario-list');
      list.innerHTML = '';
      scenarios.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'scenario-item';
        item.innerHTML = `
          <div class="scenario-fields">
            <div class="label">シナリオコード</div>
            <input type="text" value="${escHtml(s.code)}" oninput="scenarios[${i}].code=this.value">
            <div class="label">コメント（改行OK）</div>
            <textarea oninput="scenarios[${i}].comment=this.value">${escHtml(s.comment)}</textarea>
          </div>
          <button class="del-btn" onclick="deleteScenario(${i})">✕</button>
        `;
        list.appendChild(item);
      });
    }

    function addScenario() {
      scenarios.push({ code: '', comment: '' });
      buildEditorList();
      document.getElementById('scenario-list').lastElementChild?.scrollIntoView({ behavior: 'smooth' });
    }

    function deleteScenario(i) {
      scenarios.splice(i, 1);
      buildEditorList();
    }

    function saveAndClose() {
      saveToStorage(scenarios);
      index = Math.min(index, Math.max(0, scenarios.length - 1));
      render();
      document.getElementById('editor').classList.remove('open');
    }

    function resetToDefault() {
      if (!confirm('scenarios.json の初期データに戻しますか？')) return;
      fetch('scenarios.json')
        .then(r => r.json())
        .then(data => {
          scenarios = data.scenarios || [];
          buildEditorList();
        });
    }

    function escHtml(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ---- CSV ----
    function csvField(s) { return '"' + (s || '').replace(/"/g, '""') + '"'; }

    function exportCSV() {
      const lines = ['code,comment'];
      scenarios.forEach(s => lines.push(`${csvField(s.code)},${csvField(s.comment)}`));
      const blob = new Blob(['﻿' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'scenarios.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    function importCSV() { document.getElementById('csv-input').click(); }

    function handleCSVImport(input) {
      const file = input.files[0];
      if (!file) return;
      input.value = '';
      const reader = new FileReader();
      reader.onload = (e) => {
        let text = e.target.result;
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        const rows = parseCSV(text).slice(1); // skip header
        const imported = rows
          .filter(r => r.length >= 1 && (r[0] || r[1]))
          .map(r => ({ code: r[0] || '', comment: r[1] || '' }));
        if (imported.length === 0) { alert('インポートできるデータがありませんでした'); return; }
        if (!confirm(`${imported.length}件をインポートします。現在のデータは置き換えられます。`)) return;
        scenarios = imported;
        buildEditorList();
      };
      reader.readAsText(file, 'UTF-8');
    }

    function parseCSV(text) {
      const rows = [];
      let i = 0;
      const n = text.length;
      while (i < n) {
        const row = [];
        while (true) {
          let field = '';
          if (i < n && text[i] === '"') {
            i++;
            while (i < n) {
              if (text[i] === '"') {
                if (i + 1 < n && text[i + 1] === '"') { field += '"'; i += 2; }
                else { i++; break; }
              } else { field += text[i++]; }
            }
          } else {
            while (i < n && text[i] !== ',' && text[i] !== '\r' && text[i] !== '\n') field += text[i++];
          }
          row.push(field);
          if (i < n && text[i] === ',') { i++; continue; }
          if (i < n && text[i] === '\r') i++;
          if (i < n && text[i] === '\n') i++;
          break;
        }
        if (row.length > 1 || row[0] !== '') rows.push(row);
      }
      return rows;
    }

    // ---- 初期化 ----
    const saved = loadFromStorage();
    if (saved) {
      scenarios = saved;
      render();
    } else {
      fetch('scenarios.json')
        .then(r => r.json())
        .then(data => {
          scenarios = data.scenarios || [];
          saveToStorage(scenarios);
          render();
        })
        .catch(() => {
          document.getElementById('empty').textContent = 'scenarios.json の読み込みに失敗しました';
          document.getElementById('empty').style.display = '';
        });
    }
  </script>
</body>
</html>
